name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    # Repo variable DEPLOY_ENABLED gates this job. Set it to "true" in
    # Settings → Variables → Actions when you have a live EC2 + valid
    # EC2_HOST / EC2_USER / EC2_SSH_KEY secrets. Otherwise CD skips
    # cleanly so pushes don't red-X the Actions tab.
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            if [ ! -d ~/github-actions-kubernetes-masterclass ]; then
              git clone ${{ github.server_url }}/${{ github.repository }}.git ~/github-actions-kubernetes-masterclass
            fi
            cd ~/github-actions-kubernetes-masterclass
            git pull origin main
            if [ ! -f .env ]; then
              echo "ERROR: ~/github-actions-kubernetes-masterclass/.env is missing. Create it once with DOCKERHUB_USERNAME and DB credentials."
              exit 1
            fi
            docker compose pull
            docker compose up -d
            docker image prune -f

