name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Frontend
	uses: docker/build-push-action@v7
	with:
	    context: ./frontend
	    push: true
	    tags: |
		${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-ka-frontend:latest


      - name: Push Backend
        uses: docker/build-push-action@v7
        with:
            context: ./backend
            push: true
            tags: |
                ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-ka-backend:latest
             
